<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0; /* Added padding reset */
        }

        body {
            min-height: 100vh;
            font-size: 50vmin;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent; /* Set background to transparent */
            position: relative; /* Ensure the body is positioned correctly for transparency */
            overflow: hidden; /* Prevent scrolling */
        }

        .rainbow-container {
            z-index: 1;
            transform: rotate(0deg) translateZ(0);
            transform-origin: center center;
            width: 1em;
            height: 1em;
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: rainbow 3s infinite linear;
            border-radius: .5em;
            box-shadow: 0 0 .3em .05em #2c116e, inset .03em 0 .1em .02em #de66e4;
            transform-style: preserve-3d;
            perspective: 1em;
            position: relative;
            transition: width 0.1s, height 0.1s;
        }

        @keyframes rainbow {
            0% {
                transform: rotate(0deg) translateZ(0);
                box-shadow: 0 0 .3em .05em #2c116e, inset .03em 0 .1em .02em #de66e4;
            }
            25% {
                transform: rotate(90deg) translateZ(0);
                box-shadow: 0 0 .3em .05em #28126a, inset .03em 0 .1em .02em #34ceaa;
            }
            50% {
                transform: rotate(180deg) translateZ(0);
                box-shadow: 0 0 .3em .05em #28126a, inset .03em 0 .1em .02em #19b3f5;
            }
            75% {
                transform: rotate(270deg) translateZ(0);
                box-shadow: 0 0 .3em .05em #28126a, inset .03em 0 .1em .02em #3d52ac;
            }
            100% {
                transform: rotate(360deg) translateZ(0);
                box-shadow: 0 0 .3em .05em #28126a, inset .03em 0 .1em .02em #de66e4;
            }
        }

        .rainbow-container > div {
            position: absolute;
            top: .1em;
            left: .1em;
            width: .8em;
            height: .8em;
            border-radius: 50%;
            transition: width 0.1s, height 0.1s;
        }

        .green {
            background: linear-gradient(135deg, rgba(255,0,0,0) 0%, rgba(255,0,0,0) 50%, rgba(115,213,186,0.8) 100%);
            animation: curve-rotate-green 6s infinite linear;
        }

        .pink {
            background: linear-gradient(135deg, rgba(255,0,0,0) 0%, rgba(255,0,0,0) 50%, rgba(215,115,229,0.8) 100%);
            animation: curve-rotate-pink 3s infinite linear;
            transform: rotate(180deg) skew(14deg) rotate3d(1.1, 1, .9, 0);
        }

        .blue {
            background: linear-gradient(135deg, rgba(255,0,0,0) 0%, rgba(255,0,0,0) 50%, rgba(100, 149, 237, 0.8) 100%);
        }

        @keyframes curve-rotate-green {
            0% {
                transform: rotateY(0deg) skew(14deg) rotate3d(1.1, 1, .9, 0);
            }
            50% {
                transform: rotateY(0deg) skew(14deg) rotate3d(1.1, 1, .9, 180deg);
            }
            100% {
                transform: rotateY(0deg) skew(14deg) rotate3d(1.1, 1, .9, 360deg);
            }
        }

        @keyframes curve-rotate-pink {
            0% {
                transform: rotateY(180deg) skew(14deg) rotate3d(1.1, 1, .9, 0);
            }
            50% {
                transform: rotateY(180deg) skew(14deg) rotate3d(1.1, 1, .9, 180deg);
            }
            100% {
                transform: rotateY(180deg) skew(14deg) rotate3d(1.1, 1, .9, 360deg);
            }
        }
    </style>
</head>
<body>
    <div class="rainbow-container" id="rainbow-container">
        <div class="green"></div>
        <div class="pink"></div>
        <div class="blue"></div>
    </div>

    <script>
        async function setupAudio() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);

            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            function getAverageVolume(array) {
                const sum = array.reduce((a, b) => a + b, 0);
                return sum / array.length;
            }

            function animate() {
                analyser.getByteFrequencyData(dataArray);
                const amplitude = getAverageVolume(dataArray);

                // Adjust the size based on amplitude
                const maxScale = 2.5; // Change this value to control max size
                const scale = 1 + (amplitude / 255) * (maxScale - 1);

                const container = document.getElementById('rainbow-container');
                container.style.width = `${scale}em`;
                container.style.height = `${scale}em`;

                const children = container.querySelectorAll('div');
                children.forEach((child) => {
                    child.style.width = `${0.8 * scale}em`;
                    child.style.height = `${0.8 * scale}em`;
                });

                requestAnimationFrame(animate);
            }

            animate();
        }

        setupAudio();
    </script>
</body>
</html>
